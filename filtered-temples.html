<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Temple Album</title>
  <meta name="description" content="A responsive temple picture album showing temples using filtering and dynamic JavaScript.">
  <meta name="author" content="Otema Isaac">


  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">
  <script defer src="scripts/filtered-temples.js"></script>
</head>

<body>
<header>
  <div class="header-bar">
    <span class="site-title">Temple Album</span>
    <button id="menuBtn" aria-label="Toggle Menu" aria-expanded="false">☰</button>
  </div>

  <nav id="navMenu">
    <a href="#" data-filter="all">Home</a>
    <a href="#" data-filter="old">Old</a>
    <a href="#" data-filter="new">New</a>
    <a href="#" data-filter="large">Large</a>
    <a href="#" data-filter="small">Small</a>
  </nav>
</header>

<main>
  <h1>Temple Album</h1>

  <section class="filters">
    <button data-filter="all">Home</button>
    <button data-filter="old">Old</button>
    <button data-filter="new">New</button>
    <button data-filter="large">Large</button>
    <button data-filter="small">Small</button>
  </section>

  <section class="gallery" id="templeGallery"></section>
</main>

<footer>
  <p>© <span id="year"></span> Otema Isaac | Uganda</p>
  <p>Last Modified: <span id="modified"></span></p>
</footer>
</body>
</html>
