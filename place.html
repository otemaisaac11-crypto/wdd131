<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Otema Isaac">
    <meta name="description" content="This is the place page for WDD 131 – Dynamic Web Fundamentals course by Otema Isaac.">
    <title>Place Page</title>

    <link rel="stylesheet" href="styles/place.css"

    <script defer src="scripts/place.js"></script>
</head>
<body>
    <header>
        <h1>Colombia</h1>
    </header>

    <main>
        <section class="hero">

            <picture>

                <source srcset="images/large-bird.webp" 
                        media="(min-width: 800px)">

                <img src="images/small-bird.jpg" 
                    alt="A colorful bird perched on a branch" 
                
            </picture>

        </section>

        <section class="Weather">
            <h2>
                Weather
                <span class="weather-emoji">☀️</span>
            </h2>

            <img src="images/weather.jpg"
                 alt="Weather in Colombia"
                 clas="weather-icon">

                 <p><strong>Temperature:</strong> 25°C</p>
                 <p><strong>Condition:</strong> Sunny</p>
                 <p><strong>Humidity:</strong> 60%</p>
        </section>


    </main>

    <footer> 
        <p>&copy; <span id="currentyear"></span> | Otema Isaac | Uganda</p>
        <p id="lastModified"></p>

    </footer>
    
</body>
</html>
