<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a detailed review of products, including rating and features plus installation dates with personal comments.">
  <meta name="author" content="Otema Isaac">
  <title>Product Review Form</title>
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>

  <header>
    <h1>Product Review Form</h1>
    <p>Please fill out the form below to submit your product review.</p>
  </header>

  <main>
    <form method="get" action="review.html">

      <!-- Product Name -->
      <label for="product">Product Name <span>*</span></label>
      <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
      </select>

      <!-- Overall Rating -->
      <fieldset>
        <legend>Overall Rating <span>*</span></legend>

        <input type="radio" id="rating1" name="rating" value="1" required>
        <label for="rating1">1 ☆</label>

        <input type="radio" id="rating2" name="rating" value="2" required>
        <label for="rating2">2 ☆</label>

        <input type="radio" id="rating3" name="rating" value="3" required>
        <label for="rating3">3 ☆</label>

        <input type="radio" id="rating4" name="rating" value="4" required>
        <label for="rating4">4 ☆</label>

        <input type="radio" id="rating5" name="rating" value="5" required>
        <label for="rating5">5 ☆</label>
      </fieldset>

      <!-- Date of Installation -->
      <label for="date">Date of Installation <span>*</span></label>
      <input type="date" id="date" name="date" required>

      <!-- Useful Features -->
      <fieldset>
        <legend>Useful Features</legend>

        <input type="checkbox" id="feature1" name="features" value="Ease of Use">
        <label for="feature1">Ease of Use</label>

        <input type="checkbox" id="feature2" name="features" value="Design">
        <label for="feature2">Design</label>

        <input type="checkbox" id="feature3" name="features" value="Performance">
        <label for="feature3">Performance</label>

        <input type="checkbox" id="feature4" name="features" value="Support">
        <label for="feature4">Support</label>
      </fieldset>

      <!-- Written Review -->
      <label for="review">Written Review</label>
      <textarea id="review" name="review" rows="5" placeholder="Write your review here..."></textarea>

      <!-- User Name -->
      <label for="username">Your Name</label>
      <input type="text" id="username" name="username" placeholder="Optional">

      <!-- Submit Button -->
      <input type="submit" value="Submit Review">

    </form>
  </main>

  <footer>
    <p>Copyright © 2026 BYU-Pathway Worldwide</p>
  </footer>

</body>
</html>
