<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contact Uganda Tourism Hub for travel advice, bookings, and tourist information across Uganda.">
<meta name="author" content="Otema Isaac">
<title>Contact Us</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/larger.css">

<script src="scripts/tourism.js" defer></script>
</head>

<body>

<header>
<div class="site-header">
<h1>Uganda Tourism Hub</h1>
<button id="menuBtn" aria-controls="navMenu" aria-expanded="false">&#9776;</button>
</div>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="attractions.html">Attractions</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<main>

<h2>Contact Us</h2>

<form id="contactForm" method="get" action="review.html">

<fieldset>
<legend>Traveler Information</legend>

<label for="name">Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="travel-date">Preferred travel date</label>
<input type="date" id="travel-date" name="travelDate" required>

<label for="destination">Choose destination</label>
<select id="destination" name="destination" required>
<option value="" disabled selected>Select a destination</option>
<option value="bwindi">Bwindi Impenetrable Forest</option>
<option value="murchison">Murchison Falls</option>
<option value="nile">Source of the Nile</option>
<option value="queen">Queen Elizabeth National Park</option>
<option value="rwenzori">Rwenzori Mountains</option>
</select>

</fieldset>

<fieldset>
<legend>Travel Interests</legend>
<label><input type="radio" name="interest" value="safari" required> Safari</label>
<label><input type="radio" name="interest" value="birding"> Birding</label>
<label><input type="radio" name="interest" value="hiking"> Hiking</label>
<label><input type="radio" name="interest" value="culture"> Cultural Tours</label>
<label><input type="radio" name="interest" value="boat"> Boat Tours</label>
</fieldset>

<fieldset>
<legend>Additional Options</legend>
<label><input type="checkbox" name="extras" value="guide"> Travel guide</label>
<label><input type="checkbox" name="extras" value="transfers"> Airport transfers</label>
<label><input type="checkbox" name="extras" value="accommodation"> Accommodation booking</label>
<label><input type="checkbox" name="extras" value="newsletter"> Mailing list</label>
</fieldset>

<label for="details">Trip details</label>
<textarea id="details" name="details" required></textarea>

<button type="submit">Submit Request</button>

</form>

</main>

<footer>
<p>&copy; <span id="year"></span> Otema Isaac | BYU-I</p>
</footer>

</body>
</html>
